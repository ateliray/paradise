var v=document.getElementById('v'), L=document.getElementById('log');
function t0(){return performance.now();}
var start=0;
function log(m){var dt=start?((performance.now()-start)|0):0; L.textContent += '['+dt+'ms] '+m+'\n'; L.scrollTop=L.scrollHeight;}
function dims(tag){var r=v.getBoundingClientRect();log(tag+'  box='+(r.width|0)+'x'+(r.height|0)+'  natural='+v.videoWidth+'x'+v.videoHeight+'  ct='+v.currentTime.toFixed(2)+'  ready='+v.readyState);}
['loadstart','loadedmetadata','loadeddata','canplay','canplaythrough','playing','waiting','stalled'].forEach(function(ev){
  v.addEventListener(ev,function(){dims('EV:'+ev);});
});
var firstTU=true;
v.addEventListener('timeupdate',function(){ if(firstTU){firstTU=false; dims('EV:first-timeupdate');} });
function run(){
  L.textContent=''; firstTU=true;
  v.removeAttribute('src'); v.load();
  start=t0();
  log('--- set src, load(), play() ---');
  v.src=SRC; v.load();
  dims('immediately-after-src');
  var p=v.play();
  if(p&&p.catch)p.catch(function(e){log('play() rejected: '+e.name);});
  // sample box every animation frame for first 800ms
  var n=0; function sample(){ n++; if(n<=48){ if(n%6===0)dims('raf#'+n); requestAnimationFrame(sample);} }
  requestAnimationFrame(sample);
}
v.addEventListener('ended',function(){dims('EV:ended'); v.loop=false;});
window.addEventListener('load',run);
</script>
